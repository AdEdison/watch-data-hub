name: Update Watch Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update-watch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build watch market snapshot
        run: |
          python scripts/build_watch_snapshot.py

      - name: Commit updated CSV if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/watch_market_snapshot.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update watch market snapshot"
            git push
          fi
